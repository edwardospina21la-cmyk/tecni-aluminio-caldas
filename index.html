<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tecni Aluminios Caldas – Puertas, Ventanas, Pasamanos & Pérgolas</title>
  <meta name="description" content="Fabricación e instalación de puertas, ventanas, divisiones de baño en vidrio templado, pasamanos en acero inoxidable, pérgolas y fachadas en Caldas, Colombia."/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black:    #080808;
      --deep:     #111111;
      --charcoal: #1C1C1C;
      --iron:     #2A2A2A;
      --steel:    #666666;
      --silver:   #CCCCCC;
      --light:    #E8E8E8;
      --white:    #FFFFFF;
      --border:   rgba(255,255,255,0.10);
      --border-md:rgba(255,255,255,0.20);
      --glass:    rgba(255,255,255,0.04);
    }
    html, body { height:100%; }
    body {
      font-family:'Barlow',sans-serif;
      background:var(--black); color:var(--white);
      overflow-x:hidden; display:flex; flex-direction:column;
    }

    /* ── NAV ── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; justify-content:space-between; align-items:center;
      padding:0 5%; height:70px;
      background:rgba(8,8,8,0.97); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo {
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.3rem; font-weight:700; letter-spacing:3px; text-transform:uppercase;
      color:var(--white); display:flex; align-items:center; gap:.65rem; cursor:pointer;
    }
    .logo em { color:var(--silver); font-style:normal; font-weight:300; }

    /* ── TAB BAR ── */
    .tab-bar {
      display:flex; gap:0; align-items:center;
    }
    .tab-btn {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.82rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--steel); background:transparent; border:none; cursor:pointer;
      padding:.5rem 1.4rem; height:70px;
      position:relative; transition:color .2s;
      border-bottom:2px solid transparent;
    }
    .tab-btn:hover { color:var(--silver); }
    .tab-btn.active {
      color:var(--white);
      border-bottom:2px solid var(--white);
    }
    .tab-btn.tab-cta {
      color:var(--white);
      border:1px solid var(--border-md);
      height:auto; padding:.5rem 1.4rem;
      border-radius:2px; margin-left:.5rem;
      border-bottom:1px solid var(--border-md);
      transition:all .2s;
    }
    .tab-btn.tab-cta:hover { background:var(--white); color:var(--black); }
    .tab-btn.tab-cta.active {
      background:var(--white); color:var(--black);
      border-color:var(--white); border-bottom:1px solid var(--white);
    }

    /* hamburger mobile */
    .hamburger {
      display:none; flex-direction:column; gap:5px; cursor:pointer;
      background:none; border:none; padding:.5rem;
    }
    .hamburger span { width:24px; height:2px; background:var(--silver); display:block; transition:all .3s; }

    /* mobile menu */
    .mobile-menu {
      display:none; position:fixed; top:70px; left:0; right:0; z-index:199;
      background:rgba(8,8,8,0.98); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      flex-direction:column; padding:.5rem 0;
    }
    .mobile-menu.open { display:flex; }
    .mobile-tab-btn {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.9rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--silver); background:transparent; border:none; cursor:pointer;
      padding:1rem 5%; text-align:left; border-left:2px solid transparent;
      transition:all .2s;
    }
    .mobile-tab-btn:hover { color:var(--white); background:var(--glass); }
    .mobile-tab-btn.active { color:var(--white); border-left:2px solid var(--white); }

    /* ── PAGES ── */
    .page {
      display:none; padding-top:70px;
      min-height:100vh; flex-direction:column;
      animation:fadeIn .35s ease;
    }
    .page.active { display:flex; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ── INICIO ── */
    #page-inicio {
      display:none; padding-top:70px;
      min-height:100vh;
      position:relative; overflow:hidden;
    }
    #page-inicio.active { display:grid; grid-template-columns:1fr 1fr; }
    #page-inicio::before {
      content:''; position:absolute; top:0; left:0; width:50%; height:100%;
      background:var(--deep); z-index:0;
    }
    #page-inicio::after {
      content:''; position:absolute; top:15%; bottom:15%; left:50%; width:1px;
      background:linear-gradient(180deg,transparent,var(--border-md) 30%,var(--border-md) 70%,transparent);
      z-index:2;
    }
    .hero-left {
      position:relative; z-index:3;
      padding:7rem 8% 5rem 10%;
      display:flex; flex-direction:column; justify-content:center;
    }
    .hero-eyebrow {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.7rem; letter-spacing:5px; text-transform:uppercase;
      color:var(--silver); margin-bottom:2rem;
      display:flex; align-items:center; gap:1rem;
    }
    .hero-eyebrow::before { content:''; width:32px; height:1px; background:var(--steel); }
    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3.5rem,6vw,7rem); font-weight:300; line-height:1; letter-spacing:-1px;
    }
    h1 strong { font-weight:600; display:block; }
    h1 em { font-style:italic; color:var(--silver); display:block; }
    .hero-divider { width:48px; height:1px; background:var(--steel); margin:2.5rem 0; }
    .hero-sub { color:var(--silver); font-size:1rem; line-height:1.8; max-width:400px; }
    .hero-btns { display:flex; gap:1rem; margin-top:2.5rem; flex-wrap:wrap; }
    .btn-primary {
      background:var(--white); color:var(--black); padding:.85rem 2rem;
      font-family:'Barlow Condensed',sans-serif; font-size:.78rem; font-weight:600;
      letter-spacing:2.5px; text-transform:uppercase; text-decoration:none;
      border-radius:2px; transition:all .25s; border:none; cursor:pointer;
    }
    .btn-primary:hover { background:var(--light); transform:translateY(-2px); }
    .btn-ghost {
      background:transparent; color:var(--silver); border:1px solid var(--border-md);
      padding:.85rem 2rem; font-family:'Barlow Condensed',sans-serif;
      font-size:.78rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase;
      text-decoration:none; border-radius:2px; transition:all .25s; cursor:pointer;
    }
    .btn-ghost:hover { border-color:var(--silver); color:var(--white); }
    .hero-badges {
      display:flex; gap:2.5rem; margin-top:3.5rem;
      padding-top:2.5rem; border-top:1px solid var(--border); flex-wrap:wrap;
    }
    .badge-num { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:700; letter-spacing:-1px; }
    .badge-label { font-size:.68rem; color:var(--silver); letter-spacing:2px; text-transform:uppercase; margin-top:.1rem; }
    .hero-right {
      position:relative; z-index:3;
      display:grid; grid-template-rows:1fr 1fr; grid-template-columns:1fr 1fr;
      gap:1px; background:var(--border);
    }
    .hero-panel {
      background:var(--black); display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:.8rem;
      position:relative; cursor:pointer; transition:background .3s;
    }
    .hero-panel:hover { background:var(--charcoal); }
    .hero-panel .panel-icon { font-size:2.8rem; }
    .hero-panel .panel-label {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.78rem; letter-spacing:3px; text-transform:uppercase; color:var(--silver);
    }
    .hero-panel::after {
      content:attr(data-num); position:absolute; top:1rem; left:1.2rem;
      font-family:'Barlow Condensed',sans-serif; font-size:.62rem; color:var(--silver);
    }

    /* ── SHARED SECTION STYLES ── */
    .sec-wrap { padding:5rem 10%; flex:1; }
    .section-label {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.7rem; letter-spacing:5px; text-transform:uppercase;
      color:var(--silver); margin-bottom:.8rem;
      display:flex; align-items:center; gap:.8rem;
    }
    .section-label::before { content:''; width:24px; height:1px; background:var(--steel); }
    h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.5rem,4.5vw,5rem); font-weight:600; line-height:1; letter-spacing:-1px;
    }
    h2 em { font-style:italic; color:var(--silver); }
    .section-body { color:var(--silver); max-width:520px; line-height:1.8; font-size:.97rem; margin-top:1rem; }

    /* ── NOSOTROS ── */
    #page-nosotros { background:var(--deep); flex-direction:column; }
    .sobre-layout {
      display:grid; grid-template-columns:1fr 1fr;
      flex:1; min-height:calc(100vh - 70px);
    }
    .sobre-content {
      padding:6rem 8% 6rem 10%;
      display:flex; flex-direction:column; justify-content:center;
      border-right:1px solid var(--border);
    }
    .sobre-grid-right {
      display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
      gap:1px; background:var(--border);
    }
    .sobre-cell {
      background:var(--charcoal); display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:.4rem; transition:background .3s;
    }
    .sobre-cell:hover { background:var(--iron); }
    .cell-num { font-family:'Cormorant Garamond',serif; font-size:4rem; font-weight:600; letter-spacing:-2px; line-height:1; }
    .cell-label { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--silver); }
    .sobre-text { color:var(--silver); line-height:1.8; }

    /* Responsive tweaks for PC vs Mobile without removing existing structure */
    @media (max-width: 1024px) {
      /* reduce padding y turnar páginas en fila única cuando necesario */
      #page-inicio.active { grid-template-columns: 1fr; }
      .hero-left { padding:5rem 6% 3rem 6%; }
      .hero-right { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      /* navegación y layout móvil */
      nav { padding:0 4%; height:64px; }
      .hamburger { display:flex; }
      .tab-bar { display:none; }
      .mobile-menu { display:flex; }
      .mobile-menu.open { display:flex; }
      /* estructura de inicio en una columna para pantallas pequeñas */
      #page-inicio.active { display:flex; flex-direction:column; }
      #page-inicio { min-height:auto; padding-bottom:2rem; }
      .hero-left { padding:4rem 6% 2rem; }
      .hero-right { display:none; } /* ocultamos paneles grandes en móvil para simplificar (opcional) */
      .section-body { font-size: .95rem; }
      h1 { font-size: clamp(2.5rem, 6vw, 4rem); }
      .cell-num { font-size: 3.2rem; }
    }
  </style>
</head>
<body>

</html>
